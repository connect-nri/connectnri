<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="ConnectNRI - Connecting NRIs with their roots"/>

  <!-- Open Graph tags for WhatsApp/social preview -->
  <meta property="og:title" content="ConnectNRI" />
  <meta property="og:description" content="View this post on ConnectNRI" />
  <meta property="og:image" content="https://dasvandh.github.io/connectnri/logo.png" />
  <meta property="og:url" content="https://dasvandh.github.io/connectnri/" />
  <meta property="og:type" content="website" />

  <title>ConnectNRI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0fdf4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    .app-name { font-size: 26px; font-weight: 800; color: #166534; margin-bottom: 6px; }
    .tagline { font-size: 14px; color: #6b7280; margin-bottom: 32px; }

    .status-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
    }

    .status-icon { font-size: 28px; margin-bottom: 8px; }
    .status-text { font-size: 14px; color: #166534; font-weight: 500; }
    .status-sub { font-size: 12px; color: #6b7280; margin-top: 4px; }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid #bbf7d0;
      border-top-color: #16a34a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: block; width: 100%;
      padding: 16px; border-radius: 14px;
      font-size: 16px; font-weight: 700;
      text-decoration: none; cursor: pointer;
      border: none; margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.85; }
    .btn-primary { background: #16a34a; color: white; }
    .btn-secondary { background: #f3f4f6; color: #374151; font-weight: 600; }
    .divider { font-size: 12px; color: #9ca3af; margin: 4px 0 12px; }
    .footer { font-size: 11px; color: #9ca3af; margin-top: 24px; }

    #loading-section { display: block; }
    #success-section { display: none; }
    #fallback-section { display: none; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Punjab map outline as logo -->
    <img
      class="logo"
      src="https://dasvandh.github.io/connectnri/punjab.png"
      alt="Punjab"
      onerror="this.style.display='none'"
    />

    <div class="app-name">ConnectNRI</div>
    <div class="tagline">Connecting NRIs with their roots</div>

    <div id="loading-section" class="status-box">
      <div class="spinner"></div>
      <div class="status-text">Opening ConnectNRI...</div>
      <div class="status-sub">Please wait a moment</div>
    </div>

    <div id="success-section" class="status-box">
      <div class="status-icon">✅</div>
      <div class="status-text">Opening in the app...</div>
      <div class="status-sub">Switch to the ConnectNRI app</div>
    </div>

    <div id="fallback-section">
      <div class="status-box" style="margin-bottom: 20px;">
        <div class="status-icon">📱</div>
        <div class="status-text">Get ConnectNRI</div>
        <div class="status-sub">Install the app to view this post</div>
      </div>
      <a class="btn btn-primary" id="playstore-btn"
         href="https://play.google.com/store/apps/details?id=com.connectnri.app">
        ▶ Get it on Google Play
      </a>
      <div class="divider">or</div>
      <button class="btn btn-secondary" id="try-again-btn">
        Try Opening App Again
      </button>
    </div>

    <div class="footer">ConnectNRI &copy; 2025 · All rights reserved</div>
  </div>

  <script>
    const PACKAGE_NAME = 'com.connectnri.app';
    const PLAY_STORE_URL = `https://play.google.com/store/apps/details?id=${PACKAGE_NAME}`;

    const params = new URLSearchParams(window.location.search);
    const postId = params.get('post');

    const loadingSection = document.getElementById('loading-section');
    const successSection = document.getElementById('success-section');
    const fallbackSection = document.getElementById('fallback-section');
    const tryAgainBtn = document.getElementById('try-again-btn');

    function showFallback() {
      loadingSection.style.display = 'none';
      successSection.style.display = 'none';
      fallbackSection.style.display = 'block';
    }

    function showSuccess() {
      loadingSection.style.display = 'none';
      fallbackSection.style.display = 'none';
      successSection.style.display = 'block';
    }

    function tryOpenApp(postId) {
      const deepLink = `intent://post/${postId}#Intent;scheme=connectnri;package=com.connectnri.app;S.browser_fallback_url=${encodeURIComponent(PLAY_STORE_URL)};end`;

      const a = document.createElement('a');
      a.href = deepLink;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      let appOpened = false;
      const onBlur = () => { appOpened = true; };
      window.addEventListener('blur', onBlur);

      setTimeout(() => {
        window.removeEventListener('blur', onBlur);
        if (appOpened) {
          showSuccess();
        } else {
          showFallback();
        }
      }, 2500);
    }

    tryAgainBtn?.addEventListener('click', () => {
      loadingSection.style.display = 'block';
      fallbackSection.style.display = 'none';
      if (postId) tryOpenApp(postId);
    });

    if (postId) {
      tryOpenApp(postId);
    } else {
      window.location.href = PLAY_STORE_URL;
    }
  </script>
</body>
</html>
