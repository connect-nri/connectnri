<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="ConnectNRI - Connecting NRIs with their roots"/>
  <meta property="og:title" content="ConnectNRI" />
  <meta property="og:description" content="View this on ConnectNRI" />
  <meta property="og:image" content="https://connect-nri.github.io/connectnri/punjab.png" />
  <meta property="og:url" content="https://connect-nri.github.io/connectnri/" />
  <meta property="og:type" content="website" />
  <title>ConnectNRI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0fdf4;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: white; border-radius: 20px; padding: 40px 32px;
      max-width: 400px; width: 100%; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { width: 90px; height: 90px; object-fit: contain; margin-bottom: 12px; }
    .app-name { font-size: 26px; font-weight: 800; color: #166534; margin-bottom: 6px; }
    .tagline { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
    .status-box {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 12px; padding: 16px; margin-bottom: 28px;
    }
    .status-icon { font-size: 28px; margin-bottom: 8px; }
    .status-text { font-size: 14px; color: #166534; font-weight: 500; }
    .status-sub { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 3px solid #bbf7d0; border-top-color: #16a34a;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: block; width: 100%; padding: 16px; border-radius: 14px;
      font-size: 16px; font-weight: 700; text-decoration: none;
      cursor: pointer; border: none; margin-bottom: 12px; transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.85; }
    .btn-primary { background: #16a34a; color: white; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .divider { font-size: 12px; color: #9ca3af; margin: 4px 0 12px; }
    .footer { font-size: 11px; color: #9ca3af; margin-top: 24px; }
    #loading-section { display: block; }
    #success-section { display: none; }
    #fallback-section { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo"
      src="https://connect-nri.github.io/connectnri/punjab.png"
      alt="Punjab"
      onerror="this.style.display='none'" />
    <div class="app-name">ConnectNRI</div>
    <div class="tagline">Connecting NRIs with their roots</div>

    <div id="loading-section" class="status-box">
      <div class="spinner"></div>
      <div class="status-text">Opening ConnectNRI...</div>
      <div class="status-sub">Please wait a moment</div>
    </div>

    <div id="success-section" class="status-box">
      <div class="status-icon">✅</div>
      <div class="status-text">Opening in the app...</div>
      <div class="status-sub">Switch to the ConnectNRI app</div>
    </div>

    <div id="fallback-section">
      <div class="status-box" style="margin-bottom:20px;">
        <div class="status-icon">📱</div>
        <div class="status-text">App not detected</div>
        <div class="status-sub">Install ConnectNRI to view this</div>
      </div>
      <a class="btn btn-primary"
         href="https://play.google.com/store/apps/details?id=com.connectnri.app">
        ▶ Get it on Google Play
      </a>
      <div class="divider">already installed?</div>
      <button class="btn btn-secondary" id="try-again-btn">
        Try Opening App Again
      </button>
    </div>

    <div class="footer">ConnectNRI © 2025 · All rights reserved</div>
  </div>

  <script>
    const PACKAGE   = 'com.connectnri.app';
    const STORE_URL = 'https://play.google.com/store/apps/details?id=' + PACKAGE;

    const params    = new URLSearchParams(window.location.search);
    const postId    = params.get('post');
    const profileId = params.get('profile');

    const elLoading  = document.getElementById('loading-section');
    const elSuccess  = document.getElementById('success-section');
    const elFallback = document.getElementById('fallback-section');

    function showFallback() {
      elLoading.style.display  = 'none';
      elSuccess.style.display  = 'none';
      elFallback.style.display = 'block';
    }
    function showSuccess() {
      elLoading.style.display  = 'none';
      elFallback.style.display = 'none';
      elSuccess.style.display  = 'block';
    }
    function showLoading() {
      elLoading.style.display  = 'block';
      elSuccess.style.display  = 'none';
      elFallback.style.display = 'none';
    }

    // type = 'post' or 'profile', id = the actual ID
    function tryOpenApp(type, id) {
      const intentUrl =
        'intent://' + type + '/' + encodeURIComponent(id) +
        '#Intent' +
        ';scheme=connectnri' +
        ';package=' + PACKAGE +
        ';S.browser_fallback_url=' + encodeURIComponent(STORE_URL) +
        ';end';

      const customUrl = 'connectnri://' + type + '/' + encodeURIComponent(id);

      let left = false;
      window.addEventListener('blur', function onBlur() {
        left = true;
        window.removeEventListener('blur', onBlur);
      });

      // Primary: intent:// via anchor click
      const a = document.createElement('a');
      a.href = intentUrl;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      // Fallback: iframe fires custom scheme silently
      setTimeout(function() {
        if (!left) {
          const iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = customUrl;
          document.body.appendChild(iframe);
          setTimeout(function() { document.body.removeChild(iframe); }, 1000);
        }
      }, 500);

      setTimeout(function() {
        if (left) { showSuccess(); } else { showFallback(); }
      }, 3000);
    }

    document.getElementById('try-again-btn')
      .addEventListener('click', function() {
        showLoading();
        if (postId)    tryOpenApp('post', postId);
        else if (profileId) tryOpenApp('profile', profileId);
      });

    // ── Entry point ──
    if (postId) {
      tryOpenApp('post', postId);
    } else if (profileId) {
      tryOpenApp('profile', profileId);
    } else {
      window.location.href = STORE_URL;
    }
  </script>
</body>
</html>
